<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — MERIDIAN Development</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--black:#0d0d0d;--dark:#1c1c1c;--mid:#555;--gray:#888;--light-gray:#bbb;--border:#e4e4e4;--off-white:#f8f7f5;--white:#fff;--orange:#E8601C;--orange-pale:#fff4ee;--orange-dark:#c44e12;}
html{scroll-behavior:smooth;}
body{background:var(--white);color:var(--black);font-family:'Poppins',sans-serif;font-weight:300;overflow-x:hidden;}
.cursor,.cursor-ring{display:none;}
@media(pointer:fine){
  body{cursor:none;}
  .cursor{display:block;position:fixed;width:8px;height:8px;background:var(--orange);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
  .cursor-ring{display:block;position:fixed;width:34px;height:34px;border:1.5px solid rgba(232,96,28,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.15s ease;}
}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:72px;background:rgba(255,255,255,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--black);text-decoration:none;}
.nav-logo span{color:var(--orange);}
.nav-links{display:flex;gap:36px;list-style:none;}
.nav-links a{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:600;color:var(--mid);text-decoration:none;transition:color 0.25s;}
.nav-links a:hover{color:var(--orange);}
.nav-cta{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;color:var(--white);background:var(--orange);padding:12px 28px;text-decoration:none;transition:background 0.25s;}
.nav-cta:hover{background:var(--orange-dark);}
.nav-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;z-index:201;}
.nav-hamburger span{display:block;width:24px;height:2px;background:var(--black);transition:all 0.3s ease;}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-hamburger.open span:nth-child(2){opacity:0;}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.mobile-menu{display:none;position:fixed;top:72px;left:0;right:0;bottom:0;background:var(--white);z-index:199;flex-direction:column;padding:40px 30px;transform:translateX(100%);transition:transform 0.35s ease;}
.mobile-menu.open{transform:translateX(0);}
.mobile-menu li{list-style:none;border-bottom:1px solid var(--border);}
.mobile-menu li a{display:block;padding:18px 0;font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--black);text-decoration:none;}
.mobile-menu li a:hover{color:var(--orange);}
.mobile-cta{margin-top:32px;background:var(--orange);color:var(--white);padding:16px;text-align:center;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;text-decoration:none;display:block;}
/* HERO */
.hero{margin-top:72px;position:relative;height:92vh;min-height:580px;overflow:hidden;}
.hero-img{width:100%;height:100%;object-fit:cover;filter:brightness(0.52);transform:scale(1.06);animation:heroZoom 16s ease-out forwards;display:block;}
@keyframes heroZoom{to{transform:scale(1);}}
.hero-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:64px 60px;background:linear-gradient(to top,rgba(0,0,0,0.72) 0%,rgba(0,0,0,0.18) 55%,transparent 100%);}
.hero-breadcrumb{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:22px;display:flex;align-items:center;gap:8px;}
.hero-breadcrumb a{color:rgba(255,255,255,0.5);text-decoration:none;transition:color 0.25s;}
.hero-breadcrumb a:hover{color:var(--orange);}
.hero-breadcrumb .sep{color:rgba(255,255,255,0.25);margin:0 2px;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--orange);font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:var(--white);padding:7px 16px;margin-bottom:20px;width:fit-content;}
.hero-badge.completed{background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;display:block;flex-shrink:0;}
.hero-title{font-family:'Montserrat',sans-serif;font-size:clamp(40px,7vw,96px);font-weight:700;color:var(--white);line-height:1;letter-spacing:-0.025em;margin-bottom:12px;}
.hero-tagline{font-family:'Poppins',sans-serif;font-size:clamp(14px,1.8vw,20px);color:rgba(255,255,255,0.6);font-weight:300;font-style:italic;margin-bottom:36px;}
.hero-meta{display:flex;flex-wrap:wrap;gap:0;border-top:1px solid rgba(255,255,255,0.15);padding-top:28px;}
.hero-meta-item{display:flex;flex-direction:column;gap:5px;padding-right:40px;margin-right:40px;border-right:1px solid rgba(255,255,255,0.12);}
.hero-meta-item:last-child{border-right:none;padding-right:0;margin-right:0;}
.hero-meta-label{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.38);font-weight:700;}
.hero-meta-value{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--white);}
/* STICKY BAR */
.sticky-bar{position:sticky;top:72px;z-index:200;background:var(--white);border-bottom:1px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:54px;transform:translateY(-160%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);}
.sticky-bar.visible{transform:translateY(0);}
.sticky-bar-left{display:flex;align-items:center;gap:16px;overflow:hidden;}
.sticky-name{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;}
.sticky-status{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--white);background:var(--orange);padding:4px 10px;white-space:nowrap;flex-shrink:0;}
.sticky-status.completed{background:var(--mid);}
.sticky-tabs{display:flex;margin-left:4px;}
.sticky-tab{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;color:var(--gray);padding:0 14px;height:54px;display:flex;align-items:center;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;background:none;transition:all 0.25s;white-space:nowrap;}
.sticky-tab:hover{color:var(--orange);}
.sticky-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.sticky-enquire{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;color:var(--white);background:var(--orange);padding:10px 24px;text-decoration:none;white-space:nowrap;transition:background 0.25s;flex-shrink:0;}
.sticky-enquire:hover{background:var(--orange-dark);}
/* SHARED */
.section-tag{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.35em;text-transform:uppercase;font-weight:700;color:var(--orange);margin-bottom:18px;display:block;}
.section-title{font-family:'Montserrat',sans-serif;font-size:clamp(28px,3.5vw,48px);font-weight:700;line-height:1.1;letter-spacing:-0.02em;margin-bottom:24px;}
.section-title em{font-style:italic;font-weight:300;font-family:'Poppins',sans-serif;color:var(--orange);}
.reveal{opacity:0;transform:translateY(28px);transition:opacity 0.75s ease,transform 0.75s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
/* OVERVIEW */
.overview{padding:80px 60px;display:grid;grid-template-columns:1fr 380px;gap:64px;align-items:start;}
.overview-desc p{font-size:14px;line-height:1.9;color:var(--gray);margin-bottom:16px;}
.overview-desc p:last-child{margin-bottom:0;}
.overview-highlights{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:36px 0 0;}
.highlight-item{flex:1;padding:24px 0;text-align:center;border-right:1px solid var(--border);}
.highlight-item:last-child{border-right:none;}
.highlight-num{font-family:'Montserrat',sans-serif;font-size:32px;font-weight:700;color:var(--orange);display:block;line-height:1;}
.highlight-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-top:5px;display:block;}
/* SIDEBAR */
.sidebar-card{background:var(--off-white);padding:32px;position:sticky;top:140px;}
.sidebar-title{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;color:var(--orange);margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--orange);}
.sidebar-rows{display:flex;flex-direction:column;}
.sidebar-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;gap:16px;align-items:baseline;}
.sidebar-row:last-child{border-bottom:none;}
.sidebar-row-label{color:var(--gray);flex-shrink:0;font-size:12px;}
.sidebar-row-value{font-family:'Montserrat',sans-serif;font-weight:700;color:var(--black);text-align:right;line-height:1.35;}
.avail-bar-wrap{margin:22px 0 4px;}
.avail-bar-label{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:var(--mid);margin-bottom:9px;}
.avail-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.avail-bar-fill{height:100%;background:var(--orange);width:0;transition:width 1.4s cubic-bezier(0.4,0,0.2,1);}
.avail-bar-sub{font-size:11px;color:var(--gray);margin-top:6px;}
.btn-orange{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;color:var(--white);background:var(--orange);padding:14px;text-align:center;text-decoration:none;display:block;transition:background 0.25s;margin-top:20px;border:none;cursor:pointer;width:100%;}
.btn-orange:hover{background:var(--orange-dark);}
.btn-outline{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;color:var(--orange);background:transparent;padding:13px;text-align:center;text-decoration:none;display:block;transition:all 0.25s;margin-top:10px;border:1.5px solid var(--orange);cursor:pointer;width:100%;}
.btn-outline:hover{background:var(--orange);color:var(--white);}
/* GALLERY */
.gallery{padding:0 60px 80px;}
.gallery-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;}
.gallery-cell{position:relative;overflow:hidden;cursor:pointer;}
.gallery-main{grid-column:1/3;grid-row:1/3;}
.gallery-main .gallery-img{min-height:460px;}
.gallery-thumb .gallery-img{min-height:176px;}
.gallery-img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.82);transition:transform 0.6s ease,filter 0.45s ease;}
.gallery-cell:hover .gallery-img{transform:scale(1.05);filter:brightness(1);}
.gallery-label{position:absolute;bottom:0;left:0;right:0;padding:14px 18px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.65));font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.8);opacity:0;transition:opacity 0.3s;}
.gallery-cell:hover .gallery-label{opacity:1;}
.gallery-main-hint{position:absolute;top:18px;right:18px;background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.75);font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;padding:6px 12px;backdrop-filter:blur(4px);}
/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:9000;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox-img{max-width:90vw;max-height:82vh;object-fit:contain;}
.lb-close{position:absolute;top:20px;right:28px;color:rgba(255,255,255,0.55);font-size:28px;cursor:pointer;background:none;border:none;transition:color 0.2s;padding:8px;line-height:1;}
.lb-close:hover{color:var(--white);}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.45);font-size:42px;cursor:pointer;background:none;border:none;padding:14px;line-height:1;transition:color 0.2s;}
.lb-nav:hover{color:var(--white);}
.lb-prev{left:12px;}
.lb-next{right:12px;}
.lb-footer{position:absolute;bottom:24px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.lb-label{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.55);}
.lb-counter{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.2em;color:rgba(255,255,255,0.28);}
/* FLOOR PLANS */
.floor-plans{background:var(--off-white);padding:80px 60px;}
.fp-tabs{display:flex;border-bottom:1px solid var(--border);margin:32px 0 36px;flex-wrap:wrap;}
.fp-tab{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gray);padding:13px 22px;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;background:none;transition:all 0.25s;white-space:nowrap;}
.fp-tab:hover{color:var(--orange);}
.fp-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.fp-panel{display:none;}
.fp-panel.active{display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:start;}
.fp-svg-wrap{background:var(--white);padding:40px;display:flex;align-items:center;justify-content:center;min-height:320px;border:1px solid var(--border);}
.fp-svg{width:100%;max-width:340px;}
.fp-floor-label{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:var(--mid);padding:11px 16px;background:var(--white);border-left:3px solid var(--orange);margin-bottom:20px;}
.fp-specs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.fp-spec{background:var(--white);padding:14px 18px;border-top:2px solid var(--border);transition:border-color 0.25s;}
.fp-spec:hover{border-color:var(--orange);}
.fp-spec-label{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:var(--gray);margin-bottom:5px;}
.fp-spec-value{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:var(--black);}
.fp-spec-value.orange{color:var(--orange);}
.fp-inc{margin-bottom:28px;}
.fp-inc h4{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;font-weight:700;color:var(--mid);margin-bottom:14px;}
.fp-inc ul{list-style:none;display:flex;flex-direction:column;gap:9px;}
.fp-inc li{display:flex;gap:10px;font-size:13px;color:var(--gray);line-height:1.55;align-items:flex-start;}
.fp-inc li::before{content:'◈';color:var(--orange);font-size:8px;margin-top:4px;flex-shrink:0;}
.fp-enquire{display:inline-block;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;color:var(--white);background:var(--orange);padding:13px 28px;text-decoration:none;transition:background 0.25s;}
.fp-enquire:hover{background:var(--orange-dark);}
/* AMENITIES */
.amenities{padding:80px 60px;}
.amenities-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:44px;}
.amenity-card{background:var(--off-white);padding:34px 28px;position:relative;overflow:hidden;transition:background 0.3s;}
.amenity-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--orange);transform:scaleX(0);transition:transform 0.4s ease;transform-origin:left;}
.amenity-card:hover{background:var(--orange-pale);}
.amenity-card:hover::after{transform:scaleX(1);}
.amenity-icon{font-size:22px;margin-bottom:16px;display:block;}
.amenity-title{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;color:var(--black);}
.amenity-desc{font-size:12px;line-height:1.72;color:var(--gray);}
/* DESIGN TEAM */
.design-team{background:var(--dark);padding:80px 60px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;}
.dt-section-tag{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.35em;text-transform:uppercase;font-weight:700;color:rgba(232,96,28,0.85);margin-bottom:18px;display:block;}
.dt-section-title{font-family:'Montserrat',sans-serif;font-size:clamp(28px,3.5vw,48px);font-weight:700;line-height:1.1;letter-spacing:-0.02em;margin-bottom:24px;color:var(--white);}
.dt-section-title em{font-style:italic;font-weight:300;font-family:'Poppins',sans-serif;color:var(--orange);}
.dt-quote{font-family:'Poppins',sans-serif;font-size:clamp(15px,1.8vw,20px);font-style:italic;font-weight:300;line-height:1.72;color:rgba(255,255,255,0.65);border-left:3px solid var(--orange);padding-left:24px;margin:28px 0 12px;}
.dt-attr{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--orange);}
.dt-team{display:flex;flex-direction:column;gap:2px;margin-top:36px;}
.dt-member{display:flex;gap:16px;align-items:center;padding:16px 18px;background:rgba(255,255,255,0.05);transition:background 0.3s;}
.dt-member:hover{background:rgba(255,255,255,0.09);}
.dt-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.dt-role{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;font-weight:700;color:var(--orange);}
.dt-name{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--white);margin-top:3px;margin-bottom:2px;}
.dt-firm{font-size:12px;color:rgba(255,255,255,0.38);}
.dt-img{width:100%;aspect-ratio:4/5;object-fit:cover;filter:brightness(0.6);display:block;}
/* LOCATION */
.location{padding:80px 60px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;}
.loc-img-wrap{position:relative;overflow:hidden;}
.loc-img{width:100%;min-height:420px;object-fit:cover;filter:brightness(0.72);display:block;transition:transform 0.7s ease;}
.loc-img-wrap:hover .loc-img{transform:scale(1.03);}
.loc-img-caption{position:absolute;bottom:0;left:0;right:0;padding:14px 20px;background:linear-gradient(transparent,rgba(0,0,0,0.6));}
.loc-img-caption-text{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.6);}
.loc-pins{display:flex;flex-direction:column;gap:0;}
.loc-category{padding-bottom:24px;margin-bottom:24px;border-bottom:1px solid var(--border);}
.loc-category:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.loc-cat{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;font-weight:700;color:var(--orange);margin-bottom:10px;display:block;}
.loc-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.loc-item:last-child{border-bottom:none;}
.loc-item-name{color:var(--mid);}
.loc-item-dist{font-family:'Montserrat',sans-serif;font-weight:700;color:var(--orange);font-size:12px;white-space:nowrap;margin-left:16px;}
/* TESTIMONIALS */
.testimonials{background:var(--off-white);padding:80px 60px;}
.testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:44px;}
.testimonial-card{background:var(--white);padding:36px 28px;border-top:3px solid var(--border);transition:border-color 0.3s;}
.testimonial-card:hover{border-color:var(--orange);}
.t-quote-mark{font-family:'Georgia',serif;font-size:52px;color:var(--orange);opacity:0.55;line-height:0.65;display:block;margin-bottom:18px;}
.t-text{font-size:14px;line-height:1.82;color:var(--gray);font-style:italic;margin-bottom:24px;}
.t-name{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:var(--black);}
.t-unit{font-size:11px;color:var(--orange);margin-top:4px;}
/* RELATED */
.related{padding:80px 60px;}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:44px;}
.related-card{position:relative;overflow:hidden;text-decoration:none;display:block;}
.related-img{width:100%;aspect-ratio:4/3;object-fit:cover;filter:brightness(0.7);display:block;transition:transform 0.55s ease,filter 0.4s ease;}
.related-card:hover .related-img{transform:scale(1.05);filter:brightness(0.48);}
.related-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,13,0.9) 0%,transparent 55%);padding:20px;display:flex;flex-direction:column;justify-content:flex-end;}
.related-type{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.24em;text-transform:uppercase;font-weight:700;color:var(--orange);margin-bottom:5px;}
.related-name{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:var(--white);margin-bottom:4px;line-height:1.2;}
.related-loc{font-size:12px;color:rgba(255,255,255,0.6);}
.related-status{position:absolute;top:14px;right:14px;font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;padding:5px 10px;background:var(--orange);color:var(--white);}
.related-status.done{background:rgba(0,0,0,0.55);}
/* CTA BAND */
.cta-band{background:var(--orange);padding:70px 60px;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;}
.cta-band h2{font-family:'Montserrat',sans-serif;font-size:clamp(22px,3vw,38px);font-weight:700;color:var(--white);line-height:1.2;}
.cta-band h2 em{font-style:italic;font-weight:300;font-family:'Poppins',sans-serif;}
.btn-white{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:var(--orange);background:var(--white);padding:16px 36px;text-decoration:none;display:inline-block;transition:all 0.25s;white-space:nowrap;}
.btn-white:hover{background:var(--black);color:var(--white);}
/* FOOTER */
footer{background:var(--dark);padding:60px 60px 36px;}
.footer-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:44px;flex-wrap:wrap;gap:36px;}
.footer-logo{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700;letter-spacing:0.28em;text-transform:uppercase;color:var(--white);text-decoration:none;}
.footer-logo span{color:var(--orange);}
.footer-links{display:flex;gap:48px;flex-wrap:wrap;}
.footer-col h4{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;color:var(--orange);margin-bottom:18px;}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:10px;}
.footer-col a{font-family:'Poppins',sans-serif;font-size:13px;color:#888;text-decoration:none;font-weight:300;transition:color 0.25s;}
.footer-col a:hover{color:var(--white);}
.footer-bottom{border-top:1px solid #2e2e2e;padding-top:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.footer-copy{font-family:'Poppins',sans-serif;font-size:12px;color:#666;font-weight:300;}
.footer-legal{display:flex;gap:20px;}
.footer-legal a{font-family:'Poppins',sans-serif;font-size:12px;color:#666;text-decoration:none;transition:color 0.25s;}
.footer-legal a:hover{color:#aaa;}
/* NOT FOUND */
.not-found{margin-top:72px;min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px;}
.not-found h1{font-family:'Montserrat',sans-serif;font-size:48px;font-weight:700;margin-bottom:16px;}
.not-found p{color:var(--gray);margin-bottom:32px;}
/* RESPONSIVE */

<script>
// ── Cursor ──────────────────────────────────────────────────────────────
if (window.matchMedia('(pointer:fine)').matches) {
  const cur = document.getElementById('cursor'), ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cur.style.left = mx+'px'; cur.style.top = my+'px'; });
  (function loop(){ rx += (mx-rx)*0.12; ry += (my-ry)*0.12; ring.style.left = rx+'px'; ring.style.top = ry+'px'; requestAnimationFrame(loop); })();
}

// ── Hamburger ───────────────────────────────────────────────────────────
const hb = document.getElementById('hamburger'), mm = document.getElementById('mobileMenu');
hb.addEventListener('click', () => { hb.classList.toggle('open'); mm.classList.toggle('open'); document.body.style.overflow = mm.classList.contains('open') ? 'hidden' : ''; });
document.querySelectorAll('.mobile-link').forEach(l => l.addEventListener('click', () => { hb.classList.remove('open'); mm.classList.remove('open'); document.body.style.overflow = ''; }));

// ── Floor plan SVG generator ────────────────────────────────────────────
function makeSVG(fp) {
  const beds = parseInt(fp.beds) || 2;
  const isEstate = fp.floors && fp.floors.toLowerCase().includes('single');

  function r(x, y, w, h, label, accent) {
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" stroke="#ddd" stroke-width="1" fill="${accent ? 'rgba(232,96,28,0.07)' : 'white'}"/>
    <text x="${x+w/2}" y="${y+h/2+4}" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="8.5" fill="${accent ? '#E8601C' : '#999'}" letter-spacing="0.8">${label}</text>`;
  }

  const wrap = (inner) => `<svg class="fp-svg" viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="12" y="12" width="296" height="256" stroke="#e0e0e0" stroke-width="1.5" fill="#f8f7f5"/>
    ${inner}
  </svg>`;

  if (isEstate) {
    return wrap([
      r(12, 12, 172, 105, 'LIVING / DINING'),
      r(184, 12, 124, 68, 'KITCHEN'),
      r(184, 80, 124, 55, 'DINING ROOM'),
      r(12, 117, 110, 88, 'PRIMARY SUITE'),
      r(122, 117, 86, 88, 'BEDROOM 2'),
      r(208, 135, 100, 70, 'STUDY'),
      r(12, 205, 296, 63, 'TERRACE / GARDENS', true),
    ].join(''));
  }

  const rooms = [r(12, 12, 175, 108, 'LIVING / DINING'), r(187, 12, 121, 68, 'KITCHEN'), r(187, 80, 121, 55, 'BATHROOMS')];
  const bedH = beds >= 4 ? 74 : beds >= 3 ? 82 : 92;
  rooms.push(r(12, 120, 112, bedH, 'PRIMARY SUITE'));
  if (beds >= 2) rooms.push(r(124, 120, 88, bedH, 'BEDROOM 2'));
  if (beds >= 3) rooms.push(r(212, 135, 96, beds >= 4 ? 58 : 74, 'BEDROOM 3'));
  if (beds >= 4) rooms.push(r(212, 193, 96, 55, 'BEDROOM 4'));
  const tY = 120 + bedH;
  rooms.push(r(12, tY, 200, 268-tY, 'TERRACE', true));
  return wrap(rooms.join(''));
}

}

  // ── Post-render ─────────────────────────────────────────────────────

  // Availability bar animation
  if (!done) {
    setTimeout(() => {
      const bar = document.getElementById('availBar');
      if (bar) bar.style.width = p.availablePct + '%';
    }, 500);
  }

  // Sticky bar: show once hero scrolls out of view
  const stickyBar = document.getElementById('stickyBar');
  new IntersectionObserver(entries => {
    stickyBar.classList.toggle('visible', !entries[0].isIntersecting);
  }, { threshold: 0 }).observe(document.getElementById('sec-hero'));

  // Sticky tabs: click scrolls to section (accounting for both bars)
  const tabs = document.querySelectorAll('.sticky-tab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const el = document.getElementById(tab.dataset.target);
      if (!el) return;
      const offset = 72 + 54 + 16; // nav + sticky bar + breathing room
      const top = el.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({ top, behavior: 'smooth' });
    });
  });

  // Sticky tabs: highlight active section on scroll
  // One observer per section — rootMargin keeps "active" band centered in viewport
  const secObs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const id = entry.target.id;
      tabs.forEach(t => t.classList.toggle('active', t.dataset.target === id));
    });
  }, { rootMargin: '-25% 0px -70% 0px' });

  ['sec-overview', 'sec-gallery', 'sec-plans', 'sec-amenities', 'sec-location'].forEach(id => {
    const el = document.getElementById(id);
    if (el) secObs.observe(el);
  });

  // Floor plan tabs
  document.querySelectorAll('.fp-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.fp-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.fp-panel').forEach(panel => panel.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('fpp' + tab.dataset.fp).classList.add('active');
    });
  });

  // Lightbox
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbLabel = document.getElementById('lbLabel');
  const lbCtr = document.getElementById('lbCounter');
  const imgs = p.galleryImgs;
  let lbi = 0;

  function openLb(i) {
    lbi = (i + imgs.length) % imgs.length;
    lbImg.src = imgs[lbi].src;
    lbLabel.textContent = imgs[lbi].label;
    lbCtr.textContent = (lbi + 1) + ' / ' + imgs.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLb() { lb.classList.remove('open'); document.body.style.overflow = ''; }
  function navLb(d) { openLb(lbi + d); }

  document.querySelectorAll('.gallery-cell').forEach(cell =>
    cell.addEventListener('click', () => openLb(+cell.dataset.lb))
  );
  document.getElementById('lbClose').addEventListener('click', closeLb);
  document.getElementById('lbPrev').addEventListener('click', () => navLb(-1));
  document.getElementById('lbNext').addEventListener('click', () => navLb(1));
  lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') navLb(-1);
    if (e.key === 'ArrowRight') navLb(1);
  });

  // Scroll reveals
  const revObs = new IntersectionObserver(entries => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 80);
        revObs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.07 });
  document.querySelectorAll('.reveal').forEach(el => revObs.observe(el));
}

prop ? render(prop) : renderNotFound();
</script>
