<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — MERIDIAN Development</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--black:#0d0d0d;--dark:#1c1c1c;--mid:#555;--gray:#888;--border:#e4e4e4;--off-white:#f8f7f5;--white:#fff;--orange:#E8601C;--orange-pale:#fff4ee;--orange-dark:#c44e12;}
html{scroll-behavior:smooth;}
body{background:var(--white);color:var(--black);font-family:'Poppins',sans-serif;font-weight:300;overflow-x:hidden;}
.cursor,.cursor-ring{display:none;}
@media(pointer:fine){body{cursor:none;}.cursor{display:block;position:fixed;width:8px;height:8px;background:var(--orange);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}.cursor-ring{display:block;position:fixed;width:34px;height:34px;border:1.5px solid rgba(232,96,28,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.15s;}}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:72px;background:rgba(255,255,255,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--black);text-decoration:none;}
.nav-logo span{color:var(--orange);}
.nav-links{display:flex;gap:36px;list-style:none;}
.nav-links a{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:600;color:var(--mid);text-decoration:none;transition:color 0.25s;}
.nav-links a:hover{color:var(--orange);}
.nav-cta{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;color:var(--white);background:var(--orange);padding:12px 28px;text-decoration:none;transition:background 0.25s;}
.nav-cta:hover{background:var(--orange-dark);}
.nav-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;z-index:201;}
.nav-hamburger span{display:block;width:24px;height:2px;background:var(--black);transition:all 0.3s;}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-hamburger.open span:nth-child(2){opacity:0;}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.mobile-menu{display:none;position:fixed;top:72px;left:0;right:0;bottom:0;background:var(--white);z-index:199;flex-direction:column;padding:40px 30px;transform:translateX(100%);transition:transform 0.35s;}
.mobile-menu.open{transform:translateX(0);}
.mobile-menu li{list-style:none;border-bottom:1px solid var(--border);}
.mobile-menu li a{display:block;padding:18px 0;font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--black);text-decoration:none;}
.mobile-menu li a:hover{color:var(--orange);}
.mobile-cta{margin-top:32px;background:var(--orange);color:var(--white);padding:16px;text-align:center;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;text-decoration:none;display:block;}
.hero{margin-top:72px;position:relative;height:92vh;min-height:600px;overflow:hidden;}
.hero-img{width:100%;height:100%;object-fit:cover;filter:brightness(0.55);transform:scale(1.06);animation:heroZoom 14s ease-out forwards;}
@keyframes heroZoom{to{transform:scale(1);}}
.hero-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:60px;}
.hero-breadcrumb{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:18px;}
.hero-breadcrumb a{color:rgba(255,255,255,0.55);text-decoration:none;transition:color 0.25s;}
.hero-breadcrumb a:hover{color:var(--orange);}
.hero-breadcrumb span{color:rgba(255,255,255,0.3);margin:0 8px;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--orange);font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--white);padding:7px 16px;margin-bottom:18px;}
.hero-badge.completed{background:rgba(255,255,255,0.2);}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;display:block;}
.hero-title{font-family:'Montserrat',sans-serif;font-size:clamp(44px,7vw,96px);font-weight:700;color:var(--white);line-height:1;letter-spacing:-0.02em;margin-bottom:10px;}
.hero-tagline{font-family:'Poppins',sans-serif;font-size:clamp(14px,1.8vw,20px);color:rgba(255,255,255,0.65);font-weight:300;margin-bottom:32px;}
.hero-meta{display:flex;gap:36px;flex-wrap:wrap;}
.hero-meta-item{display:flex;flex-direction:column;gap:3px;}
.hero-meta-label{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.4);font-weight:700;}
.hero-meta-value{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--white);}
.sticky-bar{position:sticky;top:72px;z-index:100;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:56px;transform:translateY(-200%);transition:transform 0.4s;}
.sticky-bar.visible{transform:translateY(0);}
.sticky-bar-left{display:flex;align-items:center;gap:20px;}
.sticky-name{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;}
.sticky-status{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--white);background:var(--orange);padding:4px 10px;}
.sticky-status.completed{background:var(--mid);}
.sticky-tabs{display:flex;margin-left:16px;}
.sticky-tab{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;color:var(--gray);padding:0 14px;height:56px;display:flex;align-items:center;border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;transition:all 0.25s;}
.sticky-tab:hover,.sticky-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.sticky-enquire{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;color:var(--white);background:var(--orange);padding:10px 24px;text-decoration:none;white-space:nowrap;transition:background 0.25s;}
.sticky-enquire:hover{background:var(--orange-dark);}
.section-tag{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.35em;text-transform:uppercase;font-weight:700;color:var(--orange);margin-bottom:18px;display:block;}
.section-title{font-family:'Montserrat',sans-serif;font-size:clamp(28px,3.5vw,48px);font-weight:700;line-height:1.1;letter-spacing:-0.02em;margin-bottom:24px;}
.section-title em{font-style:italic;font-weight:300;font-family:'Poppins',sans-serif;color:var(--orange);}
.reveal{opacity:0;transform:translateY(28px);transition:opacity 0.7s,transform 0.7s;}
.reveal.visible{opacity:1;transform:translateY(0);}
.overview{padding:80px 60px;display:grid;grid-template-columns:1fr 380px;gap:60px;align-items:start;}
.overview-desc p{font-size:14px;line-height:1.9;color:var(--gray);margin-bottom:16px;}
.overview-highlights{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:32px 0;}
.highlight-item{flex:1;padding:22px 0;text-align:center;border-right:1px solid var(--border);}
.highlight-item:last-child{border-right:none;}
.highlight-num{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:700;color:var(--orange);display:block;line-height:1;}
.highlight-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-top:4px;display:block;}
.sidebar-card{background:var(--off-white);padding:32px;}
.sidebar-title{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;font-weight:700;color:var(--orange);margin-bottom:20px;}
.sidebar-rows{display:flex;flex-direction:column;}
.sidebar-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;gap:16px;}
.sidebar-row:last-child{border-bottom:none;}
.sidebar-row-label{color:var(--gray);flex-shrink:0;}
.sidebar-row-value{font-family:'Montserrat',sans-serif;font-weight:700;color:var(--black);text-align:right;}
.avail-bar-wrap{margin:20px 0 4px;}
.avail-bar-label{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:var(--mid);margin-bottom:8px;}
.avail-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.avail-bar-fill{height:100%;background:var(--orange);width:0;transition:width 1.4s cubic-bezier(.4,0,.2,1);}
.avail-bar-sub{font-size:11px;color:var(--gray);margin-top:6px;}
.btn-orange{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;color:var(--white);background:var(--orange);padding:14px;text-align:center;text-decoration:none;display:block;transition:background 0.25s;margin-top:20px;border:none;cursor:pointer;width:100%;}
.btn-orange:hover{background:var(--orange-dark);}
.btn-outline{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;color:var(--orange);background:transparent;padding:13px;text-align:center;text-decoration:none;display:block;transition:all 0.25s;margin-top:10px;border:1.5px solid var(--orange);cursor:pointer;width:100%;}
.btn-outline:hover{background:var(--orange);color:var(--white);}
.gallery{padding:0 60px 80px;}
.gallery-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;}
.gallery-cell{position:relative;overflow:hidden;cursor:pointer;}
.gallery-main{grid-column:1/3;grid-row:1/3;}
.gallery-main .gallery-img{min-height:460px;}
.gallery-thumb .gallery-img{min-height:176px;}
.gallery-img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.85);transition:transform 0.6s,filter 0.4s;}
.gallery-cell:hover .gallery-img{transform:scale(1.04);filter:brightness(1);}
.gallery-label{position:absolute;bottom:0;left:0;right:0;padding:14px 18px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.6));font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.75);opacity:0;transition:opacity 0.3s;}
.gallery-cell:hover .gallery-label{opacity:1;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:9000;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox-img{max-width:90vw;max-height:85vh;object-fit:contain;}
.lb-close{position:absolute;top:24px;right:32px;color:rgba(255,255,255,0.6);font-size:28px;cursor:pointer;background:none;border:none;transition:color 0.2s;}
.lb-close:hover{color:var(--white);}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.5);font-size:36px;cursor:pointer;background:none;border:none;padding:12px;transition:color 0.2s;}
.lb-nav:hover{color:var(--white);}
.lb-prev{left:16px;}
.lb-next{right:16px;}
.lb-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.2em;color:rgba(255,255,255,0.4);}
.floor-plans{background:var(--off-white);padding:80px 60px;}
.fp-tabs{display:flex;border-bottom:1px solid var(--border);margin:32px 0 36px;flex-wrap:wrap;}
.fp-tab{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gray);padding:13px 22px;border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;transition:all 0.25s;}
.fp-tab:hover,.fp-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.fp-panel{display:none;}
.fp-panel.active{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;}
.fp-svg-wrap{background:var(--white);padding:40px;display:flex;align-items:center;justify-content:center;min-height:300px;}
.fp-svg{width:100%;max-width:340px;}
.fp-specs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;}
.fp-spec{background:var(--white);padding:14px 18px;}
.fp-spec-label{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:var(--gray);margin-bottom:5px;}
.fp-spec-value{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:var(--black);}
.fp-spec-value.orange{color:var(--orange);}
.fp-inc h4{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;font-weight:700;color:var(--mid);margin-bottom:12px;}
.fp-inc ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.fp-inc li{display:flex;gap:10px;font-size:13px;color:var(--gray);line-height:1.5;}
.fp-inc li::before{content:'◈';color:var(--orange);font-size:8px;margin-top:4px;flex-shrink:0;}
.amenities{padding:80px 60px;}
.amenities-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:44px;}
.amenity-card{background:var(--off-white);padding:32px 26px;transition:background 0.3s;}
.amenity-card:hover{background:var(--orange-pale);}
.amenity-icon{font-size:22px;margin-bottom:14px;display:block;}
.amenity-title{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:9px;}
.amenity-desc{font-size:12px;line-height:1.7;color:var(--gray);}
.design-team{background:var(--dark);padding:80px 60px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;}
.dt-quote{font-family:'Poppins',sans-serif;font-size:clamp(15px,1.8vw,20px);font-style:italic;font-weight:300;line-height:1.7;color:rgba(255,255,255,0.7);border-left:3px solid var(--orange);padding-left:24px;margin:28px 0 12px;}
.dt-attr{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--orange);}
.dt-team{display:flex;flex-direction:column;gap:16px;margin-top:32px;}
.dt-member{display:flex;gap:16px;align-items:center;padding:16px;background:rgba(255,255,255,0.05);}
.dt-avatar{width:50px;height:50px;border-radius:50%;object-fit:cover;filter:grayscale(20%);}
.dt-role{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;font-weight:700;color:var(--orange);}
.dt-name{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--white);margin-top:2px;}
.dt-firm{font-size:12px;color:rgba(255,255,255,0.4);}
.dt-img{width:100%;aspect-ratio:4/5;object-fit:cover;filter:brightness(0.6);}
.location{padding:80px 60px;display:grid;grid-template-columns:1fr 1fr;gap:60px;}
.loc-img{width:100%;min-height:400px;object-fit:cover;filter:brightness(0.75);display:block;}
.loc-pins{margin-top:28px;display:flex;flex-direction:column;gap:24px;}
.loc-cat{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.24em;text-transform:uppercase;font-weight:700;color:var(--orange);margin-bottom:8px;}
.loc-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.loc-item:last-child{border-bottom:none;}
.loc-item-name{color:var(--mid);}
.loc-item-dist{font-family:'Montserrat',sans-serif;font-weight:700;color:var(--orange);font-size:12px;}
.testimonials{background:var(--off-white);padding:80px 60px;}
.testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:44px;}
.testimonial-card{background:var(--white);padding:32px 28px;}
.t-quote-mark{font-family:'Georgia',serif;font-size:52px;color:var(--orange);line-height:0.6;display:block;margin-bottom:16px;}
.t-text{font-size:14px;line-height:1.8;color:var(--gray);font-style:italic;margin-bottom:22px;}
.t-name{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:var(--black);}
.t-unit{font-size:11px;color:var(--orange);margin-top:3px;}
.related{padding:80px 60px;}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:44px;}
.related-card{position:relative;overflow:hidden;text-decoration:none;display:block;}
.related-img{width:100%;aspect-ratio:4/3;object-fit:cover;filter:brightness(0.7);display:block;transition:transform 0.55s,filter 0.4s;}
.related-card:hover .related-img{transform:scale(1.04);filter:brightness(0.5);}
.related-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,13,0.88) 0%,transparent 55%);padding:20px;display:flex;flex-direction:column;justify-content:flex-end;}
.related-type{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.24em;text-transform:uppercase;font-weight:700;color:var(--orange);margin-bottom:5px;}
.related-name{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:var(--white);margin-bottom:3px;}
.related-loc{font-size:12px;color:rgba(255,255,255,0.6);}
.cta-band{background:var(--orange);padding:70px 60px;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;}
.cta-band h2{font-family:'Montserrat',sans-serif;font-size:clamp(22px,3vw,38px);font-weight:700;color:var(--white);line-height:1.2;}
.cta-band h2 em{font-style:italic;font-weight:300;font-family:'Poppins',sans-serif;}
.btn-white{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:var(--orange);background:var(--white);padding:16px 36px;text-decoration:none;display:inline-block;transition:all 0.25s;white-space:nowrap;}
.btn-white:hover{background:var(--black);color:var(--white);}
footer{background:var(--dark);padding:60px 60px 36px;}
.footer-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:44px;flex-wrap:wrap;gap:36px;}
.footer-logo{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700;letter-spacing:0.28em;text-transform:uppercase;color:var(--white);text-decoration:none;}
.footer-logo span{color:var(--orange);}
.footer-links{display:flex;gap:48px;flex-wrap:wrap;}
.footer-col h4{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;color:var(--orange);margin-bottom:18px;}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:10px;}
.footer-col a{font-family:'Poppins',sans-serif;font-size:13px;color:#888;text-decoration:none;transition:color 0.25s;}
.footer-col a:hover{color:var(--white);}
.footer-bottom{border-top:1px solid #2e2e2e;padding-top:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.footer-copy{font-family:'Poppins',sans-serif;font-size:12px;color:#666;}
.footer-legal{display:flex;gap:20px;}
.footer-legal a{font-family:'Poppins',sans-serif;font-size:12px;color:#666;text-decoration:none;transition:color 0.25s;}
.footer-legal a:hover{color:#aaa;}
.not-found{margin-top:72px;min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px;}
.not-found h1{font-family:'Montserrat',sans-serif;font-size:48px;font-weight:700;margin-bottom:16px;}
.not-found p{color:var(--gray);margin-bottom:32px;}
@media(max-width:1100px){nav{padding:0 36px;}.overview,.gallery,.floor-plans,.amenities,.design-team,.location,.testimonials,.related,.cta-band{padding-left:40px;padding-right:40px;}.sticky-bar{padding:0 40px;}.overview{grid-template-columns:1fr 340px;}.amenities-grid{grid-template-columns:1fr 1fr;}footer{padding:50px 40px 30px;}}
@media(max-width:900px){nav{padding:0 28px;}.nav-links,.nav-cta{display:none;}.nav-hamburger{display:flex;}.mobile-menu{display:flex;}.hero-overlay{padding:36px 28px;}.sticky-bar{padding:0 20px;}.sticky-tabs{display:none;}.overview{grid-template-columns:1fr;padding:60px 28px;}.gallery{padding:0 28px 60px;}.gallery-grid{grid-template-columns:1fr 1fr;}.gallery-main{grid-column:1/3;grid-row:1;}.floor-plans,.amenities,.design-team,.location,.testimonials,.related{padding:60px 28px;}.fp-panel.active{grid-template-columns:1fr;}.design-team{grid-template-columns:1fr;}.location{grid-template-columns:1fr;}.testimonials-grid{grid-template-columns:1fr 1fr;}.related-grid{grid-template-columns:1fr 1fr;}.amenities-grid{grid-template-columns:1fr 1fr;}.cta-band{padding:52px 28px;flex-direction:column;align-items:flex-start;}footer{padding:44px 28px 28px;}.footer-top{flex-direction:column;}.footer-links{gap:36px;}}
@media(max-width:600px){nav{height:64px;padding:0 20px;}.nav-logo{font-size:15px;}.mobile-menu{top:64px;}.hero{margin-top:64px;height:80vh;}.hero-overlay{padding:24px 20px;}.hero-meta{gap:16px;}.gallery{padding:0 20px 48px;}.gallery-grid{grid-template-columns:1fr;}.gallery-main{grid-column:1;grid-row:1;}.gallery-main .gallery-img{min-height:260px;}.gallery-thumb .gallery-img{min-height:160px;}.overview,.floor-plans,.amenities,.design-team,.location,.testimonials,.related,.cta-band{padding:52px 20px;}.fp-specs{grid-template-columns:1fr 1fr;}.amenities-grid{grid-template-columns:1fr;}.related-grid{grid-template-columns:1fr;}.testimonials-grid{grid-template-columns:1fr;}footer{padding:36px 20px 24px;}.footer-links{flex-direction:column;}.footer-bottom{flex-direction:column;align-items:flex-start;}}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<nav>
  <a href="index.html" class="nav-logo">Meri<span>·</span>dian</a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="process.html">Process</a></li>
    <li><a href="investors.html">Investors</a></li>
  </ul>
  <a href="contact.html" class="nav-cta">Enquire Now</a>
  <button class="nav-hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>
<ul class="mobile-menu" id="mobileMenu">
  <li><a href="about.html" class="mobile-link">About</a></li>
  <li><a href="projects.html" class="mobile-link">Projects</a></li>
  <li><a href="process.html" class="mobile-link">Process</a></li>
  <li><a href="investors.html" class="mobile-link">Investors</a></li>
  <a href="contact.html" class="mobile-cta mobile-link">Enquire Now</a>
</ul>
<div id="app"></div>
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <img class="lightbox-img" id="lbImg" src="" alt="">
  <button class="lb-nav lb-next" id="lbNext">›</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>
<script src="properties.js"></script>
<script>
// Cursor
if(window.matchMedia('(pointer:fine)').matches){
  const c=document.getElementById('cursor'),r=document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;c.style.left=mx+'px';c.style.top=my+'px';});
  (function loop(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;r.style.left=rx+'px';r.style.top=ry+'px';requestAnimationFrame(loop);})();
}
// Nav
const hb=document.getElementById('hamburger'),mm=document.getElementById('mobileMenu');
hb.addEventListener('click',()=>{hb.classList.toggle('open');mm.classList.toggle('open');document.body.style.overflow=mm.classList.contains('open')?'hidden':'';});
document.querySelectorAll('.mobile-link').forEach(l=>l.addEventListener('click',()=>{hb.classList.remove('open');mm.classList.remove('open');document.body.style.overflow='';}));

// Floor plan SVG
function makeSVG(fp){
  const beds=parseInt(fp.beds)||2;
  const isEstate=fp.floors&&fp.floors.toLowerCase().includes('single');
  if(isEstate){return `<svg class="fp-svg" viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="20" y="20" width="280" height="240" stroke="#e4e4e4" stroke-width="1.5" fill="#f8f7f5"/><rect x="20" y="20" width="130" height="100" stroke="#ddd" stroke-width="1" fill="white"/><text x="85" y="75" text-anchor="middle" font-family="Montserrat" font-size="9" fill="#999" letter-spacing="1">LIVING ROOM</text><rect x="150" y="20" width="150" height="80" stroke="#ddd" stroke-width="1" fill="white"/><text x="225" y="65" text-anchor="middle" font-family="Montserrat" font-size="9" fill="#999" letter-spacing="1">KITCHEN</text><rect x="20" y="120" width="90" height="80" stroke="#ddd" stroke-width="1" fill="white"/><text x="65" y="165" text-anchor="middle" font-family="Montserrat" font-size="9" fill="#999" letter-spacing="1">PRIMARY</text><rect x="110" y="120" width="90" height="80" stroke="#ddd" stroke-width="1" fill="white"/><text x="155" y="165" text-anchor="middle" font-family="Montserrat" font-size="9" fill="#999" letter-spacing="1">BED 2</text><rect x="200" y="100" width="100" height="60" stroke="#ddd" stroke-width="1" fill="white"/><text x="250" y="135" text-anchor="middle" font-family="Montserrat" font-size="9" fill="#999" letter-spacing="1">DINING</text><rect x="20" y="200" width="280" height="60" stroke="#ddd" stroke-width="1" fill="rgba(232,96,28,0.06)"/><text x="160" y="235" text-anchor="middle" font-family="Montserrat" font-size="9" fill="#E8601C" letter-spacing="1">TERRACE / GARDENS</text><rect x="150" y="160" width="150" height="40" stroke="#ddd" stroke-width="1" fill="white"/><text x="225" y="184" text-anchor="middle" font-family="Montserrat" font-size="9" fill="#999" letter-spacing="1">UTILITY</text></svg>`;}
  const rooms=[];
  rooms.push({x:20,y:20,w:160,h:110,l:'LIVING / DINING'});
  rooms.push({x:180,y:20,w:120,h:70,l:'KITCHEN'});
  if(beds>=2){rooms.push({x:20,y:130,w:100,h:90,l:'PRIMARY SUITE'});}
  if(beds>=2){rooms.push({x:120,y:130,w:80,h:90,l:'BEDROOM 2'});}
  if(beds>=3){rooms.push({x:200,y:90,w:100,h:70,l:'BEDROOM 3'});}
  if(beds>=4){rooms.push({x:200,y:160,w:100,h:60,l:'BEDROOM 4'});}
  rooms.push({x:20,y:220,w:280,h:50,l:'TERRACE',t:true});
  rooms.push({x:180,y:70,w:120,h:60,l:'BATHROOMS'});
  return `<svg class="fp-svg" viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="20" y="20" width="280" height="250" stroke="#e4e4e4" stroke-width="1.5" fill="#f8f7f5"/>${rooms.map(r=>`<rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" stroke="#ddd" stroke-width="1" fill="${r.t?'rgba(232,96,28,0.06)':'white'}"/><text x="${r.x+r.w/2}" y="${r.y+r.h/2+4}" text-anchor="middle" font-family="Montserrat" font-size="8" fill="${r.t?'#E8601C':'#999'}" letter-spacing="1">${r.l}</text>`).join('')}</svg>`;
}

// Get property
const params=new URLSearchParams(window.location.search);
const prop=PROPERTIES.find(p=>p.id===params.get('id'));

function renderNotFound(){
  document.title='Property Not Found — MERIDIAN';
  document.getElementById('app').innerHTML=`<div class="not-found"><h1>Property Not Found</h1><p>We couldn't find the property you were looking for.</p><a href="projects.html" style="font-family:Montserrat,sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;color:white;background:var(--orange);padding:14px 36px;text-decoration:none;display:inline-block;">View All Projects</a></div>`;
}

function render(p){
  document.title=`${p.name} — MERIDIAN Development`;
  const done=p.status==='Completed';
  const related=PROPERTIES.filter(x=>x.id!==p.id).slice(0,3);

  document.getElementById('app').innerHTML=`
<section class="hero" id="sec-overview">
  <img class="hero-img" src="${p.heroImg}" alt="${p.name}">
  <div class="hero-overlay">
    <div class="hero-breadcrumb"><a href="projects.html">Projects</a><span>›</span>${p.name}</div>
    <div class="hero-badge ${done?'completed':''}">${p.status}</div>
    <h1 class="hero-title">${p.name}</h1>
    <p class="hero-tagline">${p.tagline}</p>
    <div class="hero-meta">
      <div class="hero-meta-item"><span class="hero-meta-label">Location</span><span class="hero-meta-value">${p.location}</span></div>
      <div class="hero-meta-item"><span class="hero-meta-label">Price</span><span class="hero-meta-value">${p.price}</span></div>
      <div class="hero-meta-item"><span class="hero-meta-label">Completion</span><span class="hero-meta-value">${p.completion}</span></div>
      <div class="hero-meta-item"><span class="hero-meta-label">Architect</span><span class="hero-meta-value">${p.architect}</span></div>
    </div>
  </div>
</section>

<div class="sticky-bar" id="stickyBar">
  <div class="sticky-bar-left">
    <span class="sticky-name">${p.name}</span>
    <span class="sticky-status ${done?'completed':''}">${p.status}</span>
    <div class="sticky-tabs">
      <button class="sticky-tab active" data-target="sec-overview">Overview</button>
      <button class="sticky-tab" data-target="sec-gallery">Gallery</button>
      <button class="sticky-tab" data-target="sec-plans">Floor Plans</button>
      <button class="sticky-tab" data-target="sec-amenities">Amenities</button>
      <button class="sticky-tab" data-target="sec-location">Location</button>
    </div>
  </div>
  <a href="contact.html" class="sticky-enquire">${done?'Resale Enquiry':'Enquire Now'}</a>
</div>

<section class="overview">
  <div class="reveal">
    <span class="section-tag">${p.type}</span>
    <h2 class="section-title">${p.name}<br><em>${p.tagline}</em></h2>
    <div class="overview-desc">${p.description.map(d=>`<p>${d}</p>`).join('')}</div>
    <div class="overview-highlights">
      ${p.highlights.map(h=>`<div class="highlight-item"><span class="highlight-num">${h.num}</span><span class="highlight-label">${h.label}</span></div>`).join('')}
    </div>
  </div>
  <div class="reveal">
    <div class="sidebar-card">
      <div class="sidebar-title">Key Details</div>
      <div class="sidebar-rows">
        <div class="sidebar-row"><span class="sidebar-row-label">Address</span><span class="sidebar-row-value">${p.address}</span></div>
        <div class="sidebar-row"><span class="sidebar-row-label">Type</span><span class="sidebar-row-value">${p.type}</span></div>
        <div class="sidebar-row"><span class="sidebar-row-label">Total Homes</span><span class="sidebar-row-value">${p.units}</span></div>
        <div class="sidebar-row"><span class="sidebar-row-label">Storeys</span><span class="sidebar-row-value">${p.storeys}</span></div>
        <div class="sidebar-row"><span class="sidebar-row-label">Architect</span><span class="sidebar-row-value">${p.architect}</span></div>
        <div class="sidebar-row"><span class="sidebar-row-label">Interiors</span><span class="sidebar-row-value">${p.interiors}</span></div>
        <div class="sidebar-row"><span class="sidebar-row-label">Completion</span><span class="sidebar-row-value">${p.completion}</span></div>
        <div class="sidebar-row"><span class="sidebar-row-label">From</span><span class="sidebar-row-value">${p.price}</span></div>
      </div>
      ${!done?`<div class="avail-bar-wrap"><div class="avail-bar-label">Availability</div><div class="avail-bar-bg"><div class="avail-bar-fill" id="availBar"></div></div><div class="avail-bar-sub">${p.available} of ${p.units} residences remaining</div></div>`:''}
      <a href="contact.html" class="btn-orange">${done?'Resale Enquiry':'Enquire Now'}</a>
      <a href="contact.html" class="btn-outline">Schedule a Viewing</a>
    </div>
  </div>
</section>

<section class="gallery" id="sec-gallery">
  <div class="gallery-grid">
    ${p.galleryImgs.map((img,i)=>`<div class="${i===0?'gallery-cell gallery-main':'gallery-cell gallery-thumb'}" data-lb="${i}"><img class="gallery-img" src="${img.src}" alt="${img.label}"><div class="gallery-label">${img.label}</div></div>`).join('')}
  </div>
</section>

<section class="floor-plans" id="sec-plans">
  <div class="reveal">
    <span class="section-tag">Residences</span>
    <h2 class="section-title">Floor <em>Plans</em></h2>
  </div>
  <div class="fp-tabs">${p.floorPlans.map((fp,i)=>`<button class="fp-tab ${i===0?'active':''}" data-fp="${i}">${fp.label}</button>`).join('')}</div>
  ${p.floorPlans.map((fp,i)=>`
  <div class="fp-panel ${i===0?'active':''}" id="fpp${i}">
    <div class="fp-svg-wrap">${makeSVG(fp)}</div>
    <div>
      <div class="fp-specs">
        <div class="fp-spec"><div class="fp-spec-label">Interior</div><div class="fp-spec-value">${fp.interior}</div></div>
        <div class="fp-spec"><div class="fp-spec-label">Terrace</div><div class="fp-spec-value">${fp.terrace}</div></div>
        <div class="fp-spec"><div class="fp-spec-label">Bedrooms</div><div class="fp-spec-value">${fp.beds}</div></div>
        <div class="fp-spec"><div class="fp-spec-label">Bathrooms</div><div class="fp-spec-value">${fp.baths}</div></div>
        <div class="fp-spec"><div class="fp-spec-label">Price</div><div class="fp-spec-value orange">${fp.price}</div></div>
        <div class="fp-spec"><div class="fp-spec-label">Availability</div><div class="fp-spec-value">${fp.available}</div></div>
      </div>
      <div class="fp-inc"><h4>Included</h4><ul>${fp.inclusions.map(inc=>`<li>${inc}</li>`).join('')}</ul></div>
    </div>
  </div>`).join('')}
</section>

<section class="amenities" id="sec-amenities">
  <div class="reveal">
    <span class="section-tag">Lifestyle</span>
    <h2 class="section-title">Amenities & <em>Services</em></h2>
  </div>
  <div class="amenities-grid reveal">
    ${p.amenities.map(a=>`<div class="amenity-card"><span class="amenity-icon">${a.icon}</span><div class="amenity-title">${a.title}</div><p class="amenity-desc">${a.desc}</p></div>`).join('')}
  </div>
</section>

<section class="design-team">
  <div class="reveal">
    <span class="section-tag" style="color:rgba(232,96,28,0.85)">Design Vision</span>
    <h2 class="section-title" style="color:var(--white)">Architecture & <em>Craft</em></h2>
    <blockquote class="dt-quote">"${p.architect_quote}"</blockquote>
    <p class="dt-attr">— ${p.architect_name}</p>
    <div class="dt-team">
      ${p.designTeam.map(m=>`<div class="dt-member"><img class="dt-avatar" src="${m.img}" alt="${m.name}"><div><div class="dt-role">${m.role}</div><div class="dt-name">${m.name}</div><div class="dt-firm">${m.firm}</div></div></div>`).join('')}
    </div>
  </div>
  <div class="reveal"><img class="dt-img" src="${p.designImg}" alt="${p.name}"></div>
</section>

<section class="location" id="sec-location">
  <div class="reveal">
    <span class="section-tag">Neighbourhood</span>
    <h2 class="section-title">Location & <em>Proximity</em></h2>
    <div class="loc-pins">
      ${p.locationPins.map(cat=>`<div><div class="loc-cat">${cat.cat}</div>${cat.items.map(item=>`<div class="loc-item"><span class="loc-item-name">${item.name}</span><span class="loc-item-dist">${item.dist} ${item.unit}</span></div>`).join('')}</div>`).join('')}
    </div>
  </div>
  <div class="reveal"><img class="loc-img" src="${p.locationImg}" alt="${p.location}"></div>
</section>

${p.testimonials.length?`
<section class="testimonials">
  <div class="reveal"><span class="section-tag">Resident Voices</span><h2 class="section-title">What Our <em>Residents Say</em></h2></div>
  <div class="testimonials-grid reveal">
    ${p.testimonials.map(t=>`<div class="testimonial-card"><span class="t-quote-mark">"</span><p class="t-text">${t.text}</p><div class="t-name">${t.name}</div><div class="t-unit">${t.unit}</div></div>`).join('')}
  </div>
</section>`:''}

<section class="related">
  <div class="reveal"><span class="section-tag">Explore More</span><h2 class="section-title">Related <em>Projects</em></h2></div>
  <div class="related-grid reveal">
    ${related.map(r=>`<a href="project-detail.html?id=${r.id}" class="related-card"><img class="related-img" src="${r.heroImg}" alt="${r.name}"><div class="related-overlay"><span class="related-type">${r.type}</span><div class="related-name">${r.name}</div><div class="related-loc">${r.location}</div></div></a>`).join('')}
  </div>
</section>

<div class="cta-band">
  <h2>${done?`Interested in a<br><em>Resale Opportunity?</em>`:`Ready to Enquire<br><em>About ${p.name}?</em>`}</h2>
  <a href="contact.html" class="btn-white">${done?'Contact Our Resale Team':'Request Information Pack'}</a>
</div>

<footer>
  <div class="footer-top">
    <a href="index.html" class="footer-logo">Meri<span>·</span>dian</a>
    <div class="footer-links">
      <div class="footer-col"><h4>Developments</h4><ul><li><a href="projects.html">Current Projects</a></li><li><a href="projects.html">Completed</a></li><li><a href="projects.html">Pre-Sale</a></li></ul></div>
      <div class="footer-col"><h4>Company</h4><ul><li><a href="about.html">About Meridian</a></li><li><a href="about.html">Leadership</a></li><li><a href="investors.html">Investors</a></li></ul></div>
      <div class="footer-col"><h4>Contact</h4><ul><li><a href="contact.html">Sales Enquiries</a></li><li><a href="contact.html">Investor Enquiries</a></li><li><a href="contact.html">Careers</a></li></ul></div>
    </div>
  </div>
  <div class="footer-bottom">
    <span class="footer-copy">© 2024 Meridian Development Group. All rights reserved.</span>
    <div class="footer-legal"><a href="#">Privacy Policy</a><a href="#">Terms of Use</a></div>
  </div>
</footer>`;

  // Availability bar
  setTimeout(()=>{const b=document.getElementById('availBar');if(b)b.style.width=p.availablePct+'%';},400);

  // Sticky bar on hero scroll
  const stickyBar=document.getElementById('stickyBar');
  new IntersectionObserver(entries=>{stickyBar.classList.toggle('visible',!entries[0].isIntersecting);},{threshold:0}).observe(document.querySelector('.hero'));

  // Sticky tab scroll tracking
  const tabs=document.querySelectorAll('.sticky-tab');
  tabs.forEach(tab=>tab.addEventListener('click',()=>{const el=document.getElementById(tab.dataset.target);if(el)el.scrollIntoView({behavior:'smooth'});}));
  new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)tabs.forEach(t=>t.classList.toggle('active',t.dataset.target===e.target.id));});},{threshold:0.3}).observe(document.querySelectorAll('[id^="sec-"]'));

  // Floor plan tabs
  document.querySelectorAll('.fp-tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.fp-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.fp-panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');document.getElementById('fpp'+tab.dataset.fp).classList.add('active');});});

  // Lightbox
  const lb=document.getElementById('lightbox'),lbImg=document.getElementById('lbImg'),lbCtr=document.getElementById('lbCounter');
  let lbi=0;
  const imgs=p.galleryImgs;
  function openLb(i){lbi=i;lbImg.src=imgs[i].src;lbCtr.textContent=(i+1)+' / '+imgs.length;lb.classList.add('open');document.body.style.overflow='hidden';}
  function closeLb(){lb.classList.remove('open');document.body.style.overflow='';}
  function navLb(d){lbi=(lbi+d+imgs.length)%imgs.length;openLb(lbi);}
  document.querySelectorAll('.gallery-cell').forEach(cell=>cell.addEventListener('click',()=>openLb(+cell.dataset.lb)));
  document.getElementById('lbClose').addEventListener('click',closeLb);
  document.getElementById('lbPrev').addEventListener('click',()=>navLb(-1));
  document.getElementById('lbNext').addEventListener('click',()=>navLb(1));
  lb.addEventListener('click',e=>{if(e.target===lb)closeLb();});
  document.addEventListener('keydown',e=>{if(!lb.classList.contains('open'))return;if(e.key==='Escape')closeLb();if(e.key==='ArrowLeft')navLb(-1);if(e.key==='ArrowRight')navLb(1);});

  // Scroll reveals
  const ro=new IntersectionObserver(entries=>entries.forEach((e,i)=>{if(e.isIntersecting)setTimeout(()=>e.target.classList.add('visible'),i*80);}),{threshold:0.08});
  document.querySelectorAll('.reveal').forEach(el=>ro.observe(el));

  // Observe all sections for sticky tab tracking
  document.querySelectorAll('[id^="sec-"]').forEach(el=>{
    new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)tabs.forEach(t=>t.classList.toggle('active',t.dataset.target===e.target.id));});},{threshold:0.3}).observe(el);
  });
}

prop ? render(prop) : renderNotFound();
</script>
</body>
</html>
